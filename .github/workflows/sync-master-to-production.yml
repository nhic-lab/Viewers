name: Sync master → production

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC = 09:00 EAT
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if sync is needed
        id: check
        run: |
          git fetch origin master production
          AHEAD=$(git log origin/production..origin/master --oneline | wc -l | tr -d ' ')
          echo "ahead=$AHEAD" >> $GITHUB_OUTPUT
          if [ "$AHEAD" = "0" ]; then
            echo "master and production are already in sync — nothing to do."
          else
            echo "master is $AHEAD commit(s) ahead of production."
          fi

      - name: Check for existing open PR
        id: existing
        if: steps.check.outputs.ahead != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh pr list --base production --head master --state open --json number --jq '.[0].number // empty')
          echo "pr_number=$PR" >> $GITHUB_OUTPUT
          if [ -n "$PR" ]; then
            echo "A sync PR already exists: #$PR"
          fi

      - name: Create sync PR
        if: steps.check.outputs.ahead != '0' && steps.existing.outputs.pr_number == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base production \
            --head master \
            --title "chore: sync master → production ($(date +%Y-%m-%d))" \
            --body "Automated daily sync from \`master\` to \`production\`.

          Created by the \`sync-master-to-production\` workflow. Review and merge to promote."
